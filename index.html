<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Здоровенькі були</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .logo {
      height: 48px;
      width: 48px;
      animation: blink 1.5s infinite;
      background: white;
      border-radius: 8px;
      padding: 4px;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="app-header">
      <a href="#" class="app-header__link">
        <!-- тут твій новий неоновий логотип -->
        <img class="logo" src="logo.png" alt="Логотип Здоровенькі були" />
        <h1>Здоровенькі були</h1>
      </a>
      <nav class="nav-actions">
        <button class="primary-action" id="login-btn">Увійти</button>
        <button class="secondary-action" id="register-btn">Реєстрація</button>
        <button class="logout-button" id="logout-btn" hidden>Вийти</button>
        <button class="profile-button" id="profile-btn" hidden>Профіль</button>
      </nav>
    </header>

    <!-- Search reminders -->
    <section class="search-bar">
      <div class="search-panel">
        <input id="search-input" type="text" placeholder="Пошук нагадувань..." />
        <button class="secondary-action" id="search-btn">Пошук</button>
      </div>
    </section>

    <!-- Actions -->
    <section class="action-stack">
      <button class="primary-action" id="add-reminder-btn">Додати нагадування</button>
    </section>

    <!-- Reminders table -->
    <section class="visit-schedule">
      <h2>Ваші нагадування</h2>
      <table>
        <thead>
          <tr>
            <th>Тип</th>
            <th>Назва</th>
            <th>Дата</th>
            <th>Час</th>
            <th>Дії</th>
          </tr>
        </thead>
        <tbody id="schedule-body"></tbody>
      </table>
    </section>
  </div>

  <!-- Reminder dialog -->
  <dialog class="schedule-dialog" id="schedule-dialog">
    <form class="schedule-form" id="schedule-form">
      <h2>Нове нагадування</h2>
      <label>Тип нагадування:
        <select id="reminder-type" required>
          <option value="">— Оберіть —</option>
          <option value="visit">Візит до лікаря</option>
          <option value="medicine">Прийом ліків</option>
        </select>
      </label>
      <div id="title-field">
        <label>Назва:
          <input type="text" id="reminder-title" placeholder="Напр. Ібупрофен" />
        </label>
      </div>
      <label>Дата:<input type="date" id="reminder-date" required /></label>
      <label>Час:<input type="time" id="reminder-time" required /></label>
      <div id="doctor-field" hidden>
        <label>Пошук лікаря:<input type="text" id="doctor-search" /></label>
        <label>Оберіть лікаря:
          <select id="doctor-list">
            <option value="">— Оберіть лікаря —</option>
          </select>
        </label>
      </div>
      <div id="medicine-field" hidden>
        <label>Пошук ліків:<input type="text" id="medicine-search" /></label>
        <label>Оберіть ліки:
          <select id="medicine-list">
            <option value="">— Оберіть ліки —</option>
          </select>
        </label>
        <label>Частота:
          <select id="medicine-frequency">
            <option value="">— Оберіть частоту —</option>
            <option>1 раз на день</option>
            <option>2 рази на день</option>
            <option>3 рази на день</option>
          </select>
        </label>
      </div>
      <label>Коментар:<textarea id="reminder-comment" rows="3"></textarea></label>
      <div class="dialog-actions">
        <button type="submit" class="primary-action">Зберегти</button>
        <button type="button" class="secondary-action" id="cancel-schedule">Скасувати</button>
      </div>
    </form>
  </dialog>

  <!-- Profile dialog -->
  <dialog class="profile-dialog" id="profile-dialog">
    <div class="user-profile">
      <h2>Ваш профіль</h2>
      <div class="profile-photo">
        <!-- силует-аватар за замовчуванням -->
        <img id="profile-photo" src="avatar-silhouette.svg" alt="Аватар користувача" />
        <input type="file" id="profile-photo-upload" accept="image/*" hidden />
        <label for="profile-photo-upload" class="upload-btn">Обрати файл</label>
        <span id="file-name">Файл не обрано</span>
      </div>
      <p><strong>Ім’я:</strong> <span id="profile-firstname"></span></p>
      <p><strong>Прізвище:</strong> <span id="profile-lastname"></span></p>
      <p><strong>Email:</strong> <span id="profile-email"></span></p>
      <p><strong>Стать:</strong> <span id="profile-gender-text"></span></p>
      <div class="dialog-actions">
        <button type="button" class="secondary-action" id="close-profile">Закрити</button>
      </div>
    </div>
  </dialog>

  <!-- Register dialog -->
  <dialog class="auth-dialog" id="auth-dialog">
    <form class="auth-form" id="register-form">
      <h2>Реєстрація</h2>
      <label>Ім’я:<input type="text" id="regFirstname" required /></label>
      <label>Прізвище:<input type="text" id="regLastname" required /></label>
      <label>Email:<input type="email" id="regEmail" required /></label>
      <label>Пароль:<input type="password" id="regPassword" required /></label>
      <label>Стать:
        <select id="regGender" required>
          <option value="">— Оберіть —</option>
          <option value="male">Чоловіча</option>
          <option value="female">Жіноча</option>
        </select>
      </label>
      <div class="dialog-actions">
        <button type="submit" class="primary-action">Зареєструватися</button>
        <button type="button" class="secondary-action cancel-register">Скасувати</button>
      </div>
    </form>
  </dialog>

  <!-- Login dialog -->
  <dialog class="login-dialog" id="login-dialog">
    <form class="login-form" id="login-form">
      <h2>Вхід</h2>
      <label>Email:<input type="email" id="loginEmail" required /></label>
      <label>Пароль:<input type="password" id="loginPassword" required /></label>
      <div class="dialog-actions">
        <button type="submit" class="primary-action">Увійти</button>
        <button type="button" class="secondary-action cancel-login">Скасувати</button>
      </div>
    </form>
  </dialog>

  <div id="toast-container"></div>

  <!-- Firebase SDK (compat) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <!-- EmailJS SDK -->
  <script
    type="text/javascript"
    src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js">
  </script>
  <script type="text/javascript">
    (function () {
      emailjs.init({
        publicKey: "vE00dZpRnRKTpLUdn", // твій EmailJS PUBLIC KEY
      });
      console.log("✅ EmailJS initialized");
    })();
  </script>

  <!-- Основний скрипт з логікою -->
  <script src="script.js"></script>
</body>
</html>
