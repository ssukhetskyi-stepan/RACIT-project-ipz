<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Профіль користувача</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header class="app-header">
      <a href="index.html" class="app-header__link">
        <div class="logo"></div>
        <h1>Здоровенькі були</h1>
      </a>
    </header>

    <section class="profile-section">
      <h2>👤 Ваш профіль</h2>

      <div class="profile-avatar">
        <img src="https://via.placeholder.com/96x96.png?text=Avatar" alt="Аватар користувача" />
      </div>

      <div class="profile-info">
        <p><strong>Ім’я:</strong> <span id="user-firstname">...</span></p>
        <p><strong>Прізвище:</strong> <span id="user-lastname">...</span></p>
        <p><strong>Email:</strong> <span id="user-email">...</span></p>
      </div>

      <div class="profile-stats">
        <p><strong>Нагадувань створено:</strong> <span id="reminder-count">...</span></p>
      </div>

      <div class="profile-actions">
        <button class="secondary-action" onclick="alert('Редагування профілю ще не реалізовано')">Редагувати профіль</button>
        <button class="logout-button" id="profile-logout-btn">Вийти з акаунту</button>
      </div>
    </section>
  </div>

  <!-- Firebase SDK (той самий compat стек) -->
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyCMBo0gOn43_ovP4MiZpeGRRKX4EMjRxFg",
      authDomain: "stepanproject-e1a89.firebaseapp.com",
      projectId: "stepanproject-e1a89",
      storageBucket: "stepanproject-e1a89.firebasestorage.app",
      messagingSenderId: "910486338176",
      appId: "1:910486338176:web:6d9456735d172736d94465",
      measurementId: "G-E311946XF3"
    };

    if (!firebase.apps.length) {
      firebase.initializeApp(firebaseConfig);
    }

    const auth = firebase.auth();
    const db = firebase.firestore();

    const firstNameEl = document.getElementById('user-firstname');
    const lastNameEl = document.getElementById('user-lastname');
    const emailEl = document.getElementById('user-email');
    const countEl = document.getElementById('reminder-count');
    const logoutBtn = document.getElementById('profile-logout-btn');

    auth.onAuthStateChanged(async (user) => {
      if (!user) {
        alert("Ви не авторизовані. Перенаправлення на головну сторінку...");
        window.location.href = "index.html";
        return;
      }

      emailEl.textContent = user.email || "—";

      try {
        const userDoc = await db.collection("users").doc(user.uid).get();
        if (userDoc.exists) {
          const data = userDoc.data();
          firstNameEl.textContent = data.firstName || "—";
          lastNameEl.textContent = data.lastName || "—";
        } else {
          // fallback з displayName
          const [fn = "—", ln = "—"] = (user.displayName || "").split(" ");
          firstNameEl.textContent = fn;
          lastNameEl.textContent = ln;
        }
      } catch (e) {
        console.warn("Не вдалося прочитати users/{uid}", e);
      }

      try {
        const snapshot = await db
          .collection("reminders")
          .where("uid", "==", user.uid)
          .get();
        countEl.textContent = snapshot.size;
      } catch (e) {
        console.warn("Не вдалося отримати reminders", e);
        countEl.textContent = "—";
      }
    });

    logoutBtn.addEventListener('click', async () => {
      try {
        await auth.signOut();
      } catch (e) {
        console.warn("SignOut error", e);
      }
      window.location.href = "index.html";
    });
  </script>
</body>
</html>
